<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Abrazo Kawaii Final</title>
    <style>
        /* --- Estilos Globales --- */
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background-color: #000000; /* Fondo negro puro */
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        }

        /* --- Estilos del Botón --- */
        #btn-comenzar {
            padding: 18px 45px;
            font-size: 24px;
            letter-spacing: 1px;
            text-transform: uppercase;
            color: #edacf5;
            background-color: #6400a3; 
            border: 2px solid #9900ff;
            border-radius: 60px;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 0 10px rgba(255, 255, 255, 0.1);
            z-index: 10;
        }

        #btn-comenzar:hover {
            background-color: #5e006d;
            color: #ffffff;
            border-color: #cc00ff;
            box-shadow: 0 0 25px rgba(242, 0, 226, 0.6);
            transform: scale(1.08);
        }

        /* --- Contenedor de la Escena (Oculto inicialmente) --- */
        #escena-animacion {
            display: none; /* Se activa con JS */
            position: relative;
            width: 100%;
            height: 100%;
            justify-content: center;
            align-items: center;
        }

        /* --- Estilos de la Imagen Completa --- */
        #personajes-abrazandose {
            max-width: 80%; /* Asegura que no sea demasiado grande */
            max-height: 80%;
            opacity: 0; /* Invisible al inicio */
            display: block;
            margin: 0 auto;
        }

        /* --- Clase de Animación (activada por JS) --- */
        .iniciar-animacion #personajes-abrazandose {
            /* Usamos la animación 'aparecerKawaii' */
            animation: aparecerKawaii 1.5s ease-out forwards;
        }

        /* --- Keyframes de Animación --- */

        /* Una animación de aparición suave con un ligero rebotar 'kawaii' */
        @keyframes aparecerKawaii {
            0% {
                opacity: 0;
                transform: scale(0.5); /* Empieza pequeña */
            }
            70% {
                transform: scale(1.1); /* Crece un poco más */
            }
            100% {
                opacity: 1;
                transform: scale(1); /* Se establece en su tamaño normal */
            }
        }
    </style>
</head>
<body>

    <!-- Botón Inicial -->
    <button id="btn-comenzar">Comenzar</button>

    <!-- Contenedor de la Animación -->
    <div id="escena-animacion">
        
        <!-- Usamos la imagen proporcionada, guardada como 'personajes_abrazo.png' -->
        <img id="personajes-abrazandose" src="personajes_abrazo.png" alt="Personajes Kawaii Abrazándose">

    </div>

    <script>
        document.getElementById('btn-comenzar').addEventListener('click', function() {
            // 1. Ocultar el botón
            this.style.display = 'none';

            // 2. Mostrar el contenedor de la animación
            const escena = document.getElementById('escena-animacion');
            escena.style.display = 'flex';

            // 3. Añadir la clase que dispara la animación CSS después de un breve retraso
            setTimeout(() => {
                escena.classList.add('iniciar-animacion');
            }, 150); 
        });
    </script>
</body>
</html>
